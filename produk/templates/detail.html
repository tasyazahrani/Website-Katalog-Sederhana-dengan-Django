<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Detail Produk</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        nav {
            background: #2c3e50;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 60px;
        }

        .card {
            background: white;
            width: 500px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .card-body {
            padding: 20px;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
        }

        .harga {
            color: #27ae60;
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #2980b9;
        }

        footer {
            margin-top: 100px;
            text-align: center;
            padding: 20px;
            background: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/produk/">Produk</a>
    <a href="/kontak/">Kontak</a>
</nav>

<div class="container">
    {% if produk %}
        <div class="card">
            <img src="{{ produk.gambar }}" alt="{{ produk.nama }}">
            <div class="card-body">
                <h2>{{ produk.nama }}</h2>
                <p>{{ produk.deskripsi }}</p>
                <p class="harga">Rp{{ produk.harga }}</p>

                <a href="/produk/" class="btn">Kembali ke Produk</a>
            </div>
        </div>
    {% else %}
        <h2>Produk tidak ditemukan</h2>
    {% endif %}
</div>

<footer>
    <p>© 2026 Website Katalog</p>
</footer>

</body>
</html>
