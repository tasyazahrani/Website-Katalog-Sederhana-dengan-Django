<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Home - Katalog</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        /* Navbar */
        nav {
            background: #2c3e50;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Content */
        .container {
            text-align: center;
            margin-top: 100px;
        }

        h1 {
            color: #2c3e50;
            font-size: 36px;
        }

        p {
            color: #555;
            font-size: 18px;
        }

        /* Button */
        .btn {
            display: inline-block;
            margin: 15px;
            padding: 12px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2980b9;
        }

        footer {
            margin-top: 150px;
            text-align: center;
            padding: 20px;
            background: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <a href="/">Home</a>
        <a href="/produk/">Produk</a>
        <a href="/kontak/">Kontak</a>
    </nav>

    <!-- Content -->
    <div class="container">
        <h1>Selamat Datang di Website Katalog</h1>
        <p>Temukan berbagai produk terbaik dengan harga terjangkau</p>

        <a href="/produk/" class="btn">Lihat Produk</a>
        <a href="/kontak/" class="btn">Hubungi Kami</a>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Website Katalog Sederhana</p>
    </footer>

</body>
</html>
