<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kontak</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        nav {
            background: #2c3e50;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 80px;
        }

        .card {
            background: white;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 25px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .info {
            font-size: 16px;
            margin: 10px 0;
            color: #555;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #2980b9;
        }

        footer {
            margin-top: 100px;
            text-align: center;
            padding: 20px;
            background: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/produk/">Produk</a>
    <a href="/kontak/">Kontak</a>
</nav>

<div class="container">
    <div class="card">
        <h1>Kontak Kami</h1>

        <p class="info">📧 Email: contoh@email.com</p>
        <p class="info">📱 WhatsApp: 08123456789</p>

        <a href="/" class="btn">Kembali ke Home</a>
    </div>
</div>

<footer>
    <p>© 2026 Website Katalog</p>
</footer>

</body>
</html>
