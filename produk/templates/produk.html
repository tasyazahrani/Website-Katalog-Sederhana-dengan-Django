<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Daftar Produk</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        nav {
            background: #2c3e50;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .produk-list {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 250px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .card-body {
            padding: 15px;
        }

        .harga {
            color: #27ae60;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            padding: 20px;
            background: #2c3e50;
            color: white;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/produk/">Produk</a>
    <a href="/kontak/">Kontak</a>
</nav>

<div class="container">
    <h1>Daftar Produk</h1>

    <div class="produk-list">
        {% for p in produk %}
            <div class="card">
                <img src="{{ p.gambar }}" alt="{{ p.nama }}">
                <div class="card-body">
                    <h3>{{ p.nama }}</h3>
                    <p class="harga">Rp{{ p.harga }}</p>
                    <a href="/produk/{{ p.id }}/" class="btn">Lihat Detail</a>
                </div>
            </div>
        {% endfor %}
    </div>
</div>

<footer>
    <p>© 2026 Website Katalog</p>
</footer>

</body>
</html>
